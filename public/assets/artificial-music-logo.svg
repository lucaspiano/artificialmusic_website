<svg xmlns="http://www.w3.org/2000/svg" width="320" height="64" viewBox="0 0 320 64" aria-hidden="true">
  <!-- Square logo (waveform in a rounded square) + text -->
  <defs>
    <style>
      .am-text { font-family: Inter, system-ui, Arial, sans-serif; font-size:16px; fill:#0f172a; font-weight:600 }
    </style>
  </defs>

  <!-- rounded square with subtle stroke -->
  <rect x="8" y="8" width="48" height="48" rx="6" ry="6" fill="#ffffff" stroke="#111827" stroke-width="1" />

  <!-- waveform path inside the square -->
  <g transform="translate(8,8)">
    <path d="M4 28 C10 8, 18 8, 24 28 C30 48, 38 48, 44 28" fill="none" stroke="#111827" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- artificial music text -->
  <text x="68" y="38" class="am-text">artificial music</text>
</svg>
